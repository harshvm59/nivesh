<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nivesh — Investment by HVM</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nivesh">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#000000;--accent:#E8272C;--green:#00E676;--amber:#FF9100;
--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
--text:#FFFFFF;--text-secondary:rgba(255,255,255,0.5);
--text-tertiary:rgba(255,255,255,0.3);
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
}
html{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{background:var(--bg);min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-left:var(--safe-left);padding-right:var(--safe-right)}
.sg{font-family:'Space Grotesk',sans-serif}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#E8272C,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:10px;letter-spacing:2.5px;color:var(--text-tertiary);text-transform:uppercase;font-weight:500}
.live-dot{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-weight:500;letter-spacing:1px;text-transform:uppercase}
.live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

/* Tabs */
.tabs{display:flex;gap:2px;padding:8px 16px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.25s;border:1px solid transparent;user-select:none}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 20px rgba(232,39,44,0.3)}
.tab:not(.active):hover{background:rgba(255,255,255,0.05)}

/* Container */
.container{max-width:480px;margin:0 auto;padding:0 16px 120px}
.tab-content{display:none;animation:fadeIn 0.3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Overview */
.total-section{text-align:center;padding:28px 0 20px}
.total-label{font-size:11px;color:var(--text-secondary);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.total-value{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;letter-spacing:-0.5px}
.change-pills{display:flex;justify-content:center;gap:8px;margin-top:10px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.pill.green{background:rgba(0,230,118,0.12);color:var(--green)}
.pill.red{background:rgba(232,39,44,0.12);color:var(--accent)}

/* Allocation Bars */
.alloc-section{margin:16px 0}
.alloc-item{margin-bottom:12px}
.alloc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px}
.alloc-label{display:flex;align-items:center;gap:6px;font-weight:500}
.alloc-pct{color:var(--text-secondary);font-family:'Space Grotesk',sans-serif;font-weight:600}
.alloc-bar-wrap{position:relative;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:visible}
.alloc-bar{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.22,1,0.36,1)}
.alloc-bar.india{background:linear-gradient(90deg,#FF9933,#FF6600)}
.alloc-bar.us{background:linear-gradient(90deg,#4A90D9,#1E5CB3)}
.alloc-bar.crypto{background:linear-gradient(90deg,#F7931A,#E8850E)}
.alloc-target{position:absolute;top:-3px;width:2px;height:14px;background:#fff;border-radius:1px;opacity:0.6;z-index:2}

/* Stat Boxes */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.stat-number{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}
.stat-sub{font-size:10px;color:var(--text-tertiary);margin-top:2px}

/* Filter Chips */
.chip-row{display:flex;gap:6px;padding:12px 0;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.2s;user-select:none}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 15px rgba(232,39,44,0.25)}

/* Holdings List */
.holdings-list{display:flex;flex-direction:column;gap:2px}
.holding-item{display:flex;align-items:center;justify-content:space-between;padding:14px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s}
.holding-item:active{transform:scale(0.98);background:rgba(255,255,255,0.05)}
.holding-left{display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.positive{background:var(--green);box-shadow:0 0 8px rgba(0,230,118,0.5)}
.status-dot.neutral{background:var(--amber);box-shadow:0 0 8px rgba(255,145,0,0.4)}
.status-dot.warning{background:var(--amber);box-shadow:0 0 8px rgba(255,145,0,0.4)}
.status-dot.critical{background:var(--accent);box-shadow:0 0 8px rgba(232,39,44,0.5)}
.holding-name{font-size:14px;font-weight:600;line-height:1.2}
.holding-sector{font-size:11px;color:var(--text-tertiary)}
.holding-right{text-align:right}
.holding-value{font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.holding-pnl{font-size:12px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.holding-pnl.pos{color:var(--green)}
.holding-pnl.neg{color:var(--accent)}

/* Alert Cards */
.alert-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.alert-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.alert-card.critical::before{background:var(--accent)}
.alert-card.warning::before{background:var(--amber)}
.alert-card.opportunity::before{background:var(--green)}
.alert-card.critical{background:linear-gradient(135deg,rgba(232,39,44,0.06),rgba(0,0,0,0))}
.alert-card.warning{background:linear-gradient(135deg,rgba(255,145,0,0.06),rgba(0,0,0,0))}
.alert-card.opportunity{background:linear-gradient(135deg,rgba(0,230,118,0.06),rgba(0,0,0,0))}
.alert-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.alert-tag.critical{background:rgba(232,39,44,0.15);color:var(--accent)}
.alert-tag.warning{background:rgba(255,145,0,0.15);color:var(--amber)}
.alert-tag.opportunity{background:rgba(0,230,118,0.15);color:var(--green)}
.alert-symbol{font-size:13px;font-weight:700;margin-bottom:2px}
.alert-title{font-size:14px;font-weight:600;margin-bottom:4px}
.alert-msg{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:6px}
.alert-action{font-size:12px;color:var(--green);font-weight:500;line-height:1.4}
.alert-framework{font-size:11px;color:var(--text-tertiary);margin-top:6px;line-height:1.4;font-style:italic}

/* Crypto Tab */
.crypto-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.crypto-card:active{transform:scale(0.98)}
.crypto-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.crypto-name{font-size:15px;font-weight:600}
.crypto-symbol{font-size:12px;color:var(--text-tertiary)}
.crypto-price{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
.crypto-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:3px}
.crypto-pnl{font-weight:600;font-family:'Space Grotesk',sans-serif}
.crypto-24h{font-size:11px;margin-top:4px;font-weight:500}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;visibility:hidden;transition:all 0.3s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;max-height:92vh;background:#0A0A0A;border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:var(--safe-bottom)}
.modal-sheet.open{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:10px auto 16px}
.modal-close{position:absolute;top:12px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-content{padding:0 20px 30px}
.modal-symbol{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}
.modal-name{font-size:13px;color:var(--text-secondary);margin-bottom:4px}
.modal-signal{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:16px}
.modal-signal.SELL{background:rgba(232,39,44,0.15);color:var(--accent)}
.modal-signal.HOLD{background:rgba(255,145,0,0.15);color:var(--amber)}
.modal-signal.BUY{background:rgba(0,230,118,0.15);color:var(--green)}

.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.detail-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.detail-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-tertiary);margin-bottom:4px}
.detail-value{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}

.section-title{font-size:13px;font-weight:600;margin:20px 0 10px;padding-top:12px;border-top:1px solid var(--border)}
.summary-text{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px}
.chart-wrap{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.chart-title{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px}
canvas.chart{width:100%;height:120px}

/* Framework cards */
.fw-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.fw-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fw-name{font-size:13px;font-weight:600}
.fw-score{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700}
.fw-verdict{font-size:11px;font-weight:600;margin-bottom:8px}
.fw-detail{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.fw-detail:last-child{border:none}
.fw-metric{color:var(--text-secondary)}

/* Footer */
.footer{text-align:center;padding:40px 16px 30px;border-top:1px solid var(--border);margin-top:20px}
.footer .logo{font-size:18px}
.footer .subtitle{margin-top:4px}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

// ANALYSIS FUNCTIONS
// ═══════════════════════════════════════════════════════
function analyzeTrend(data) {
  if (!data || data.length < 4) return {direction:'insufficient',slope:0};
  const recent = data.slice(-4);
  const earlier = data.slice(-8,-4);
  const recentAvg = recent.reduce((a,b) => a+b,0)/recent.length;
  const earlierAvg = earlier.length ? earlier.reduce((a,b) => a+b,0)/earlier.length : recentAvg;
  const change = ((recentAvg - earlierAvg)/Math.abs(earlierAvg||1))*100;
  if (change > 10) return {direction:'improving',slope:change};
  if (change < -10) return {direction:'deteriorating',slope:change};
  return {direction:'stable',slope:change};
}

function buffettAnalysis(symbol) {
  const data = FUNDAMENTALS[symbol];
  if (!data) return {score:0,grade:'N/A',details:[],verdict:'N/A'};
  const latestROE = data.roe[data.roe.length-1];
  const latestDebt = data.debtToEquity[data.debtToEquity.length-1];
  const marginTrend = analyzeTrend(data.opm);
  const roeTrend = analyzeTrend(data.roe);
  let score = 0;
  const details = [];
  if (latestROE > 20) {score+=25;details.push({metric:'ROE',value:latestROE+'%',verdict:'Excellent',color:'green'});}
  else if (latestROE > 15) {score+=18;details.push({metric:'ROE',value:latestROE+'%',verdict:'Good',color:'green'});}
  else if (latestROE > 10) {score+=10;details.push({metric:'ROE',value:latestROE+'%',verdict:'Average',color:'amber'});}
  else {details.push({metric:'ROE',value:latestROE+'%',verdict:'Poor',color:'red'});}
  if (latestDebt < 0.1) {score+=25;details.push({metric:'Debt/Equity',value:latestDebt+'x',verdict:'Fortress',color:'green'});}
  else if (latestDebt < 0.5) {score+=18;details.push({metric:'Debt/Equity',value:latestDebt+'x',verdict:'Conservative',color:'green'});}
  else if (latestDebt < 1.0) {score+=10;details.push({metric:'Debt/Equity',value:latestDebt+'x',verdict:'Moderate',color:'amber'});}
  else {details.push({metric:'Debt/Equity',value:latestDebt+'x',verdict:'High',color:'red'});}
  if (marginTrend.direction === 'improving') {score+=25;details.push({metric:'Margins',value:'+'+marginTrend.slope.toFixed(1)+'%',verdict:'Expanding',color:'green'});}
  else if (marginTrend.direction === 'stable') {score+=18;details.push({metric:'Margins',value:'Stable',verdict:'Consistent',color:'green'});}
  else {score+=5;details.push({metric:'Margins',value:marginTrend.slope.toFixed(1)+'%',verdict:'Compressing',color:'red'});}
  if (roeTrend.direction === 'improving' && latestROE > 15) {score+=25;details.push({metric:'Moat',value:'Wide',verdict:'Durable',color:'green'});}
  else if (roeTrend.direction === 'stable') {score+=15;details.push({metric:'Moat',value:'Narrow',verdict:'Some advantage',color:'amber'});}
  else {score+=5;details.push({metric:'Moat',value:'None',verdict:'No advantage',color:'red'});}
  const grade = score >= 80 ? 'A' : score >= 60 ? 'B' : score >= 40 ? 'C' : 'D';
  return {score,grade,details,verdict:score>=70?'BUY/HOLD':score>=40?'HOLD/WATCH':'AVOID/SELL'};
}

function lynchAnalysis(symbol) {
  const data = FUNDAMENTALS[symbol];
  if (!data) return {peg:0,category:'N/A',verdict:'N/A',details:[]};
  const latestGrowth = data.revenueGrowth[data.revenueGrowth.length-1];
  const earningsGrowth = latestGrowth > 0 ? latestGrowth : 1;
  const assumedPE = (() => {
    if (['KPITTECH','ETERNAL','PAYTM'].includes(symbol)) return 60;
    if (['NVDA','PLTR','TSLA'].includes(symbol)) return 50;
    if (['BEL','SHRIRAMFIN','HDFCBANK'].includes(symbol)) return 25;
    if (['MSFT','META','GOOGL','AAPL'].includes(symbol)) return 30;
    return 35;
  })();
  const peg = earningsGrowth > 0 ? (assumedPE / earningsGrowth).toFixed(2) : 99;
  let category,verdict;
  if (latestGrowth > 25) category='Fast Grower';
  else if (latestGrowth > 10) category='Stalwart';
  else if (latestGrowth > 0) category='Slow Grower';
  else category='Turnaround';
  if (peg < 1) verdict='Undervalued - Strong BUY';
  else if (peg < 1.5) verdict='Fair value - HOLD';
  else if (peg < 2.5) verdict='Expensive - WATCH';
  else verdict='Overvalued - AVOID';
  return {peg:parseFloat(peg),pe:assumedPE,growthRate:latestGrowth,category,verdict,details:[
    {metric:'P/E Ratio',value:assumedPE+'x'},{metric:'Growth Rate',value:latestGrowth+'%'},
    {metric:'PEG Ratio',value:peg+'x'},{metric:'Category',value:category}
  ]};
}

function jhunjhunwalaAnalysis(symbol) {
  const data = FUNDAMENTALS[symbol];
  if (!data) return {score:0,verdict:'N/A',signals:[]};
  const signals = [];
  let score = 0;
  const sectorTailwinds = {
    KPITTECH:{macro:'negative',reason:'Global IT spending slowdown'},
    BEL:{macro:'positive',reason:'Government defence capex at all-time high'},
    SHRIRAMFIN:{macro:'positive',reason:'Credit cycle upturn, vehicle demand strong'},
    ETERNAL:{macro:'negative',reason:'Hypercompetition in quick commerce'},
    HDFCBANK:{macro:'neutral',reason:'Rate cycle peaking, NIM pressure'},
    NVDA:{macro:'positive',reason:'AI capex cycle in early innings'},
    MSFT:{macro:'neutral',reason:'Enterprise spending cautious'},
    TSLA:{macro:'neutral',reason:'EV adoption growing but competition fierce'},
    PAYTM:{macro:'negative',reason:'Regulatory headwinds, trust deficit'},
    NIO:{macro:'negative',reason:'China deflation, EV price war, cash burn'}
  };
  const sd = sectorTailwinds[symbol];
  if (sd) {
    if (sd.macro==='positive'){score+=35;signals.push({color:'green',text:'Sector tailwind: '+sd.reason});}
    else if (sd.macro==='neutral'){score+=15;signals.push({color:'amber',text:'Sector neutral: '+sd.reason});}
    else {signals.push({color:'red',text:'Sector headwind: '+sd.reason});}
  }
  const latestROE = data.roe[data.roe.length-1];
  if (latestROE > 20) {score+=20;signals.push({color:'green',text:'High ROE ('+latestROE+'%) - institutional favorite'});}
  else if (latestROE > 10) {score+=10;signals.push({color:'amber',text:'Moderate ROE ('+latestROE+'%)'});}
  else {signals.push({color:'red',text:'Low ROE ('+latestROE+'%) - value trap risk'});}
  const latestGrowth = data.revenueGrowth[data.revenueGrowth.length-1];
  if (latestGrowth > 20) {score+=15;signals.push({color:'green',text:'Strong growth ('+latestGrowth+'%) in sweet spot'});}
  const verdict = score >= 60 ? 'STRONG BUY' : score >= 40 ? 'ACCUMULATE' : score >= 20 ? 'HOLD' : 'AVOID';
  return {score,verdict,signals};
}

// ═══════════════════════════════════════════════════════
// PORTFOLIO COMPUTATION
// ═══════════════════════════════════════════════════════
function computePortfolio() {
  const indiaTotal = INDIAN_STOCKS.reduce((s,st) => s + st.currentValue,0);
  const usTotalUSD = US_STOCKS.reduce((s,st) => s + st.currentValue,0);
  const usINR = usTotalUSD * PORTFOLIO_META.currency.inr;
  const cryptoTotal = CRYPTO_HOLDINGS.reduce((s,st) => s + st.currentValue,0);
  const totalINR = indiaTotal + usINR + cryptoTotal;
  return {totalINR,indiaTotal,usTotalUSD,usINR,cryptoTotal,
    allocation:{
      india:{pct:((indiaTotal/totalINR)*100).toFixed(1),target:60},
      us:{pct:((usINR/totalINR)*100).toFixed(1),target:30},
      crypto:{pct:((cryptoTotal/totalINR)*100).toFixed(1),target:10}
    }
  };
}

async function fetchCryptoPrices() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,shiba-inu,avalanche-2,cardano&vs_currencies=inr,usd&include_24hr_change=true');
    if (!res.ok) return false;
    const data = await res.json();
    const map = {bitcoin:'BTC',ethereum:'ETH',solana:'SOL','shiba-inu':'SHIB','avalanche-2':'AVAX',cardano:'ADA'};
    Object.entries(map).forEach(([cgId,sym]) => {
      const h = CRYPTO_HOLDINGS.find(c => c.symbol === sym);
      if (h && data[cgId]) {
        h.currentPrice = data[cgId].inr;
        h.currentValue = h.qty * h.currentPrice;
        h.pnl = ((h.currentValue - h.buyValue)/h.buyValue * 100).toFixed(1)*1;
        h.change24h = data[cgId].inr_24h_change;
        if (h.pnl < -40) h.status = 'critical';
        else if (h.pnl < -10) h.status = 'warning';
        else if (h.pnl > 0) h.status = 'positive';
        else h.status = 'neutral';
      }
    });
    return true;
  } catch(e) { return false; }
}

async function fetchStockPrices() {
  // Try Yahoo Finance via CORS proxy for a few key stocks
  const symbols = ['NVDA','TSLA','MSFT','AAPL','META','GOOGL','AMZN'];
  let success = false;
  for (const sym of symbols) {
    try {
      const url = 'https://corsproxy.io/?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=1d');
      const res = await fetch(url, {signal: AbortSignal.timeout(4000)});
      if (!res.ok) continue;
      const d = await res.json();
      const price = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price) {
        const stock = US_STOCKS.find(s => s.symbol === sym);
        if (stock) {
          stock.currentPrice = price;
          stock.currentValue = stock.qty * price;
          stock.pnl = (((stock.currentValue - stock.buyValue)/stock.buyValue)*100).toFixed(1)*1;
          success = true;
        }
      }
    } catch(e) { /* fallback to static */ }
  }
  return success;
}

  livePrices = cryptoOk || stockOk;

function loadCache() {
  try {
    const cache = JSON.parse(localStorage.getItem('nivesh_cache'));
    if (cache && (Date.now() - cache.ts) < 30*60*1000) {
      cache.crypto.forEach(c => {
        const h = CRYPTO_HOLDINGS.find(x => x.symbol === c.symbol);
        if (h) { h.currentPrice=c.currentPrice; h.currentValue=c.currentValue; h.pnl=c.pnl; }
      });
      cache.us.forEach(s => {

        if (h) { h.currentPrice=s.currentPrice; h.currentValue=s.currentValue; h.pnl=s.pnl; }
      });
    }
  } catch(e) {}

function fmtINR(v) {
  if (v >= 10000000) return '\u20B9' + (v/10000000).toFixed(2) + 'Cr';
  if (v >= 100000) return '\u20B9' + (v/100000).toFixed(2) + 'L';
  if (v >= 1000) return '\u20B9' + (v/1000).toFixed(1) + 'K';
  return '\u20B9' + v.toFixed(0);
}
function fmtUSD(v) {
  if (v >= 1000000) return '$' + (v/1000000).toFixed(2) + 'M';
  if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'K';
  return '$' + v.toFixed(0);
}

// ═══════════════════════════════════════════════════════
// CHART DRAWING
// ═══════════════════════════════════════════════════════
function drawChart(canvasId, data, labels, color, unit) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = {top:8,right:8,bottom:20,left:6};
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const isUp = data[data.length-1] >= data[0];
  const lineColor = color || (isUp ? '#00E676' : '#E8272C');

  ctx.clearRect(0,0,w,h);

  // Area fill
  ctx.beginPath();
  data.forEach((v,i) => {
    const x = pad.left + (i/(data.length-1)) * cw;
    const y = pad.top + (1 - (v-min)/range) * ch;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
  grad.addColorStop(0, lineColor + '30');
  grad.addColorStop(1, lineColor + '05');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v,i) => {
    const x = pad.left + (i/(data.length-1)) * cw;
    const y = pad.top + (1 - (v-min)/range) * ch;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px Inter';
  ctx.textAlign = 'center';
  [0, Math.floor(data.length/2), data.length-1].forEach(i => {
    const x = pad.left + (i/(data.length-1)) * cw;
    ctx.fillText(labels[i] || '', x, h - 4);
  });

  // End value
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px Space Grotesk';
  ctx.textAlign = 'right';
  ctx.fillText((unit||'')+data[data.length-1], w - 2, pad.top + 12);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalSheet').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe-down to close
let touchStartY = 0;
document.getElementById('modalSheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('modalSheet').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 80 && document.getElementById('modalSheet').scrollTop <= 0) {
    closeModal();
  }
});
document.getElementById('modalOverlay').addEventListener('click', closeModal);
document.getElementById('modalClose').addEventListener('click', closeModal);

// ═══════════════════════════════════════════════════════
// TAB & FILTER HANDLERS
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === 'tab-'+tab));
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

function setAlertFilter(f) { alertFilter = f; renderAlerts(); }
function setHoldingMarket(m) { holdingMarket = m; renderHoldings(); }
function setHoldingSort(s) { holdingSort = s; renderHoldings(); }
